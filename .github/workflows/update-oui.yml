# =============================================================================
# OUI Database Updater
# =============================================================================
# Monthly workflow that downloads the latest IEEE OUI database and creates
# a new release when the data changes.
#
# The OUI database maps MAC address prefixes (first 3 bytes) to
# manufacturer/vendor names. It is embedded in the nimbus-core crate
# at compile time via include_str!("../data/oui.txt").
#
# Source: https://standards-oui.ieee.org/oui/oui.txt

name: Update OUI Database

on:
  schedule:
    # Run at 00:00 UTC on the 1st of every month
    - cron: "0 0 1 * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-oui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download latest IEEE OUI database
        id: download
        run: |
          # Try multiple mirrors with retries
          # Sources (in order of preference):
          #   1. IEEE official (can be slow/unreachable from CI)
          #   2. linuxnet.ca mirror (Debian ieee-data package mirror, very reliable)
          DOWNLOAD_OK=false
          for url in \
            "https://standards-oui.ieee.org/oui/oui.txt" \
            "https://linuxnet.ca/ieee/oui.txt"; do
            echo "Trying: $url"
            if curl -sL --retry 3 --retry-delay 5 --connect-timeout 30 \
              -o /tmp/oui_download.txt "$url"; then
              SIZE=$(wc -c < /tmp/oui_download.txt)
              if [ "$SIZE" -gt 10000 ]; then
                echo "Success ($SIZE bytes)"
                DOWNLOAD_OK=true
                break
              fi
            fi
            echo "Failed: $url"
          done

          if [ "$DOWNLOAD_OK" != "true" ]; then
            echo "All download sources failed!"
            exit 1
          fi

          cp /tmp/oui_download.txt /tmp/oui.txt
          head -3 /tmp/oui.txt
          echo "size=$(wc -c < /tmp/oui.txt)" >> "$GITHUB_OUTPUT"

      - name: Check if OUI file changed
        id: check
        run: |
          if [ -f "nimbus-core/data/oui.txt" ]; then
            if diff -q /tmp/oui.txt nimbus-core/data/oui.txt > /dev/null 2>&1; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "OUI database is up to date."
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "OUI database has changed."
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No existing OUI database found."
          fi

      - name: Update OUI file
        if: steps.check.outputs.changed == 'true'
        run: |
          cp /tmp/oui.txt nimbus-core/data/oui.txt
          echo "Updated nimbus-core/data/oui.txt"

      - name: Commit OUI update
        if: steps.check.outputs.changed == 'true'
        run: |
          DATE_TAG=$(date +'%Y-%m-%d')
          git config user.name "nimbusdns-bot"
          git config user.email "bot@nimbusdns.local"
          git add nimbus-core/data/oui.txt
          git commit -m "chore: update IEEE OUI database ($DATE_TAG)"
          git tag "oui-$DATE_TAG"
          git push
          git push origin "oui-$DATE_TAG"

      - name: Create GitHub Release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE_TAG=$(date +'%Y-%m-%d')
          ENTRY_COUNT=$(grep -c '(hex)' nimbus-core/data/oui.txt || true)
          echo "Automatic monthly update of the IEEE OUI database." > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "* Source: https://standards-oui.ieee.org/oui/oui.txt" >> /tmp/release-notes.md
          echo "* Entries: $ENTRY_COUNT manufacturer prefixes" >> /tmp/release-notes.md
          echo "* Updated: $DATE_TAG" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "This release is data-only. No code changes are included." >> /tmp/release-notes.md
          gh release create "oui-$DATE_TAG" \
            --title "OUI Database Update ($DATE_TAG)" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.ref_name }}"
