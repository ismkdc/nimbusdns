name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # -- Build native binaries ---------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-15
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: tar.gz
          - os: macos-15
            target: x86_64-apple-darwin
            suffix: macos-x64
            ext: tar.gz



          # Linux
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: tar.gz

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libsqlite3-dev libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin nimbusdns

      - name: Strip (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/nimbusdns

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nimbusdns dist/
          cp nimbus.toml dist/
          cd dist
          tar czf ../nimbusdns-${{ matrix.suffix }}.tar.gz nimbusdns nimbus.toml



      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nimbusdns-${{ matrix.suffix }}
          path: |
            nimbusdns-${{ matrix.suffix }}.tar.gz
            nimbusdns-${{ matrix.suffix }}.zip
          if-no-files-found: error

  # -- Build & push Docker image per arch (native, no QEMU) ------------
  docker:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            tag_suffix: "-amd64"
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag_suffix: "-arm64"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ismkdc/nimbusdns
          tags: |
            type=raw,value=latest${{ matrix.tag_suffix }},enable={{is_default_branch}}
            type=semver,pattern={{version}}${{ matrix.tag_suffix }}
            type=semver,pattern={{major}}.{{minor}}${{ matrix.tag_suffix }}

      - name: Build and push (${{ matrix.platform }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -- Merge into multi-arch manifest ----------------------------------
  manifest:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: docker
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ismkdc/nimbusdns:latest \
            docker.io/ismkdc/nimbusdns:latest-amd64 \
            docker.io/ismkdc/nimbusdns:latest-arm64

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ismkdc/nimbusdns
          short-description: "Rust DNS-over-TLS server with web panel, DHCP, ad blocking, and admin auth"
          readme-filepath: ./README.md

  # -- Create GitHub Release --------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          echo "## NimbusDNS ${{ github.ref_name }}" > notes.md
          echo "" >> notes.md
          echo "### 📥 Downloads" >> notes.md
          echo "" >> notes.md
          echo "| Platform | File |" >> notes.md
          echo "|----------|------|" >> notes.md
          for dir in artifacts/*/; do
            case "$dir" in
              *macos-arm64*) 
                file=$(ls "$dir" | grep -v '.dockerbuild' | head -1)
                echo "| 🍎 macOS Apple Silicon | [$file](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$file) |" >> notes.md
                ;;
              *macos-x64*)
                file=$(ls "$dir" | grep -v '.dockerbuild' | head -1)
                echo "| 🍎 macOS Intel | [$file](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$file) |" >> notes.md
                ;;
              *linux-arm64*)
                file=$(ls "$dir" | grep -v '.dockerbuild' | head -1)
                echo "| 🐧 Linux ARM64 | [$file](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$file) |" >> notes.md
                ;;
              *linux-x64*)
                file=$(ls "$dir" | grep -v '.dockerbuild' | head -1)
                echo "| 🐧 Linux x64 | [$file](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$file) |" >> notes.md
                ;;
            esac
          done
          echo "" >> notes.md
          echo "---" >> notes.md
          echo "### 🐳 Docker" >> notes.md
          echo "" >> notes.md
          echo "Pull the image:" >> notes.md
          echo '```' >> notes.md
          echo "docker pull ismkdc/nimbusdns:${{ github.ref_name }}" >> notes.md
          echo '```' >> notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: notes.md
          files: artifacts/**/*.tar.gz,artifacts/**/*.zip
          generate_release_notes: false
          draft: false
          prerelease: false
