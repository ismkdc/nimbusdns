name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build native binaries ─────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-15
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: tar.gz
          - os: macos-15
            target: x86_64-apple-darwin
            suffix: macos-x64
            ext: tar.gz

          # Windows
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
            ext: zip
          - os: windows-2025
            target: aarch64-pc-windows-msvc
            suffix: windows-arm64
            ext: zip

          # Linux
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: tar.gz

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libsqlite3-dev libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin nimbusdns

      - name: Strip (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/nimbusdns

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nimbusdns dist/
          cp nimbus.toml dist/
          cd dist
          tar czf ../nimbusdns-${{ matrix.suffix }}.tar.gz nimbusdns nimbus.toml

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item "target/${{ matrix.target }}/release/nimbusdns.exe" dist/
          Copy-Item nimbus.toml dist/
          Compress-Archive -Path dist/* -DestinationPath "nimbusdns-${{ matrix.suffix }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbusdns-${{ matrix.suffix }}
          path: nimbusdns-${{ matrix.suffix }}.*
          if-no-files-found: error

  # ── Build & push Docker image ───────────────────────────────────────
  docker:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ismkdc/nimbusdns
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, docker]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          echo "## NimbusDNS ${{ github.ref_name }}" > notes.md
          echo "" >> notes.md
          echo "### 📥 Downloads" >> notes.md
          echo "" >> notes.md
          echo "| Platform | File |" >> notes.md
          echo "|----------|------|" >> notes.md
          for dir in artifacts/*/; do
            file=$(ls "$dir" | head -1)
            case "$dir" in
              *macos-arm64*) platform="🍎 macOS Apple Silicon" ;;
              *macos-x64*)   platform="🍎 macOS Intel" ;;
              *windows-arm64*) platform="🪟 Windows ARM64" ;;
              *windows-x64*)   platform="🪟 Windows x64" ;;
              *linux-arm64*)   platform="🐧 Linux ARM64" ;;
              *linux-x64*)     platform="🐧 Linux x64" ;;
              *)              platform="📦 Other" ;;
            esac
            echo "| $platform | [$file](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$file) |" >> notes.md
          done
          echo "" >> notes.md
          echo "---" >> notes.md
          echo "### 🐳 Docker" >> notes.md
          echo "" >> notes.md
          echo "Pull the image:" >> notes.md
          echo '```' >> notes.md
          echo "docker pull ismkdc/nimbusdns:${{ github.ref_name }}" >> notes.md
          echo '```' >> notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: artifacts/**/*
          generate_release_notes: false
          draft: false
          prerelease: false
